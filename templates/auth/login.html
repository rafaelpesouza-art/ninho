<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — NinhoTutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#7F77DD' }, fontFamily: { sans: ['Nunito', 'sans-serif'] } } } }</script>
</head>
<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">
<div class="w-full max-w-sm mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-1">Ninho<span class="text-primary">Tutor</span></h1>
        <p class="text-gray-500 text-sm mb-6">Faça login para continuar</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm font-semibold bg-red-50 text-red-700 border border-red-200">
            {{ message }}
        </div>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required autofocus
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-primary text-base transition-colors">
            </div>
            <div>
                <div class="flex items-center justify-between mb-1">
                    <label class="block text-sm font-semibold text-gray-700">Senha</label>
                    <a href="{{ url_for('auth.esqueci_senha') }}" class="text-xs text-primary font-bold hover:underline">
                        Esqueci minha senha
                    </a>
                </div>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-primary text-base transition-colors">
            </div>
            <button type="submit"
                    class="w-full bg-primary hover:bg-[#6b63cc] text-white font-bold py-3 rounded-xl transition-colors shadow-md my-2">
                Entrar
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-400">
            Não tem conta?
            <a href="{{ url_for('auth.cadastro_page') }}" class="text-primary font-semibold hover:underline">Criar conta</a>
        </p>
    </div>
</div>
</body>
</html>
