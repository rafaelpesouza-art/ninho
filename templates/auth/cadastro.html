<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Criar conta — Ninho</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { 
                    primary: '{{ session.get("user_cor_primaria", "#7F77DD") }}', 
                    primaryHover: '{{ session.get("user_cor_primaria", "#7F77DD") }}e6', 
                    primaryLight: '{{ session.get("user_cor_primaria", "#7F77DD") }}1a' 
                },
                fontFamily: { sans: ['Nunito', 'sans-serif'] }
            }}
        }
    </script>
</head>
<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-sm mx-auto py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-gray-800">Ninho<span class="text-primary">Tutor</span></h1>
            <p class="text-gray-500 text-sm mt-1 font-semibold">Passo 1 de 2 — Crie sua conta</p>
        </div>

        <!-- Stepper visual -->
        <div class="flex items-center justify-center gap-2 mb-7">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full bg-primary text-white text-xs font-black flex items-center justify-center">1</div>
                <span class="text-xs font-bold text-primary">Acesso</span>
            </div>
            <div class="flex-1 h-px bg-gray-200 mx-1"></div>
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full bg-gray-200 text-gray-400 text-xs font-black flex items-center justify-center">2</div>
                <span class="text-xs font-bold text-gray-400">Perfil</span>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm font-semibold
            {% if category == 'danger' %}bg-red-50 text-red-700 border border-red-200
            {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.cadastro') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5">Email</label>
                <input type="email" name="email" required autofocus
                       placeholder="seu@email.com"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 text-base bg-gray-50 focus:bg-white transition-colors">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5">Senha</label>
                <input type="password" name="password" required minlength="6"
                       placeholder="Mínimo 6 caracteres"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 text-base bg-gray-50 focus:bg-white transition-colors">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5">Confirmar senha</label>
                <input type="password" name="confirm_password" required minlength="6"
                       placeholder="Repita a senha"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 text-base bg-gray-50 focus:bg-white transition-colors">
            </div>
            <button type="submit"
                    class="w-full bg-primary hover:bg-primaryHover text-white font-bold py-3 rounded-xl transition-colors shadow-md shadow-primary/20 mt-2">
                Continuar →
            </button>
        </form>

        <p class="mt-5 text-center text-sm text-gray-400 font-semibold">
            Já tem conta?
            <a href="{{ url_for('auth.login_page') }}" class="text-primary font-bold hover:underline">Entrar</a>
        </p>
    </div>
</div>
</body>
</html>
