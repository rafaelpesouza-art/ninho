<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Esqueci minha senha — Ninho</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#7F77DD', primaryHover: '#6b63cc', primaryLight: '#f3f1ff' }, fontFamily: { sans: ['Nunito', 'sans-serif'] } } } }</script>
</head>
<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-sm mx-auto py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

        <div class="w-14 h-14 bg-primaryLight rounded-2xl flex items-center justify-center mx-auto mb-5">
            <svg class="w-7 h-7 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
        </div>

        <h1 class="text-xl font-black text-gray-800 text-center mb-1">Esqueceu sua senha?</h1>
        <p class="text-gray-500 text-sm text-center mb-6 font-semibold">Informe seu email e enviaremos um link para criar uma nova senha.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm font-semibold
            {% if category == 'danger' %}bg-red-50 text-red-700 border border-red-200
            {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.esqueci_senha_post') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5">Email</label>
                <input type="email" name="email" required autofocus
                       placeholder="seu@email.com"
                       class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 text-sm bg-gray-50 focus:bg-white transition-colors">
            </div>
            <button type="submit"
                    class="w-full bg-primary hover:bg-primaryHover text-white font-bold py-3 rounded-xl transition-colors shadow-md shadow-primary/20">
                Enviar link de redefinição
            </button>
        </form>

        <p class="mt-5 text-center text-sm text-gray-400 font-semibold">
            Lembrou a senha?
            <a href="{{ url_for('auth.login_page') }}" class="text-primary font-bold hover:underline">Voltar ao login</a>
        </p>

    </div>
</div>
</body>
</html>
